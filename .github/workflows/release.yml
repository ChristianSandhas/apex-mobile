name: Release

# Sobald ein Tag der Form v* gepusht wird, entsteht daraus automatisch
# ein GitHub-Release. Die Notes werden aus den Commits seit dem
# vorherigen Tag erzeugt.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # volle Historie, sonst fehlen die Notes

      - name: Release anlegen
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --verify-tag
